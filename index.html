<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>รัตนมาร์ท — ระบบจัดการกะ</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" data-presets="react">
    const { useState, useCallback, useEffect, useRef } = React;

    // ══════════════════════════════════════════════════
    //  🔧 วาง URL ของ Google Apps Script ตรงนี้
    //  ตัวอย่าง: "https://script.google.com/macros/s/AKfyc.../exec"
    // ══════════════════════════════════════════════════
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzF6gwY3WKs5GAnc8QawqYNkWkJEY5miRrXjvx9_Xs2ftrWcPcLvwAMyMafTmC30v_D/exec";
    const SECRET_TOKEN = "rattanashiftmgt";

    // ── API helpers ──────────────────────────────────
    function loadFromSheets() {
      return new Promise((resolve, reject) => {
        const cb = "_gsLoad_" + Date.now();
        window[cb] = (res) => {
          delete window[cb];
          if (res.ok) resolve(res.data);
          else reject(new Error(res.error));
        };
        const s = document.createElement("script");
        s.src = `${SCRIPT_URL}?callback=${cb}`;
        s.onerror = () => reject(new Error("ไม่สามารถเชื่อมต่อ Google Sheets ได้"));
        document.head.appendChild(s);
        setTimeout(() => reject(new Error("Timeout")), 15000);
      });
    }

    async function saveToSheets(action, payload) {
      try {
        await fetch(SCRIPT_URL, {
          method: "POST",
          mode: "no-cors",
          body: JSON.stringify({ action, token: SECRET_TOKEN, ...payload }),
        });
      } catch (e) {
        // no-cors fetch always throws on response reading — ignore
      }
    }

    // ── Loading screen ───────────────────────────────
    function LoadingScreen({ message }) {
      return (
        <div style={{minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",background:"linear-gradient(135deg,#0a1628,#0f2347 50%,#0d1f3c)",fontFamily:"Sarabun,sans-serif"}}>
          <div style={{width:68,height:68,background:"linear-gradient(135deg,#c9a227,#e8c547)",borderRadius:18,display:"flex",alignItems:"center",justifyContent:"center",fontSize:30,fontWeight:900,color:"#0a1628",marginBottom:20,boxShadow:"0 8px 30px rgba(201,162,39,.4)"}}>R</div>
          <div style={{fontSize:20,fontWeight:800,color:"#c9a227",marginBottom:8}}>รัตนมาร์ท</div>
          <div style={{color:"#9aabb8",fontSize:14,marginBottom:24}}>{message||"กำลังโหลดข้อมูลจาก Google Sheets..."}</div>
          <div style={{width:40,height:40,border:"3px solid rgba(201,162,39,.3)",borderTop:"3px solid #c9a227",borderRadius:"50%",animation:"spin 1s linear infinite"}}/>
          <style>{`@keyframes spin{to{transform:rotate(360deg)}}`}</style>
        </div>
      );
    }

    function ErrorScreen({ message, onRetry }) {
      return (
        <div style={{minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",background:"#0a1628",fontFamily:"Sarabun,sans-serif",padding:24,textAlign:"center"}}>
          <div style={{fontSize:48,marginBottom:16}}>⚠️</div>
          <div style={{fontSize:18,fontWeight:700,color:"#f5c842",marginBottom:8}}>เชื่อมต่อไม่ได้</div>
          <div style={{color:"#9aabb8",fontSize:14,marginBottom:8,maxWidth:380}}>{message}</div>
          <div style={{color:"#9aabb8",fontSize:12,marginBottom:24,maxWidth:380}}>ตรวจสอบว่า SCRIPT_URL ถูกต้อง และ Apps Script ถูก Deploy แล้ว</div>
          <button onClick={onRetry} style={{padding:"10px 24px",background:"#c9a227",border:"none",borderRadius:10,color:"#0a1628",fontFamily:"Sarabun,sans-serif",fontSize:14,fontWeight:700,cursor:"pointer"}}>ลองใหม่</button>
        </div>
      );
    }

    // ── Saving indicator ─────────────────────────────
    function SavingBadge({ saving }) {
      if (!saving) return null;
      return (
        <div style={{position:"fixed",bottom:16,left:"50%",transform:"translateX(-50%)",background:"rgba(201,162,39,.9)",color:"#0a1628",padding:"6px 16px",borderRadius:20,fontSize:13,fontWeight:700,zIndex:9999,display:"flex",alignItems:"center",gap:7}}>
          <div style={{width:14,height:14,border:"2px solid rgba(10,22,40,.3)",borderTop:"2px solid #0a1628",borderRadius:"50%",animation:"spin 0.8s linear infinite"}}/>
          กำลังบันทึก...
        </div>
      );
    }

    // ══════════════════════════════════════════════════
    //  APP ROOT — loads from Sheets, syncs changes back
    // ══════════════════════════════════════════════════
    function App() {
      const [loadState, setLoadState] = useState("loading"); // loading|error|ready
      const [loadError, setLoadError] = useState("");
      const [saving, setSaving] = useState(false);
      const [darkMode, setDarkMode] = useState(()=>localStorage.getItem("rattana_theme")!=="light");

      const [role, setRole] = useState(null);
      const [user, setUser] = useState(null);
      const [tab, setTab] = useState("schedule");
      const [period, setPeriod] = useState({ year: new Date().getFullYear(), month: new Date().getMonth()+1, half:"1-15" });

      const [managers, setManagersRaw] = useState([]);
      const [teams, setTeamsRaw]   = useState([]);
      const [emps,  setEmpsRaw]    = useState([]);
      const [slots, setSlotsRaw]   = useState([]);
      const [shifts,setShiftsRaw]  = useState({});
      const [otReqs,setOtReqsRaw]  = useState([]);
      const [holidays, setHolidaysRaw] = useState([]);
      const [settings, setSettingsRaw] = useState({workdays:[0,1,2,3,4,5,6]});
      const [leaves,   setLeavesRaw]   = useState([]);

      const [toast, setToast] = useState(null);

      // ── Toast helper ──
      const showToast = useCallback((msg,type="success")=>{
        setToast({msg,type}); setTimeout(()=>setToast(null),3500);
      },[]);

      // ── Load from Sheets ──
      const loadData = useCallback(async () => {
        setLoadState("loading");
        try {
          const data = await loadFromSheets();
          // Rebuild teams with their slots
          const rawTeams = data.teams||[];
          const rawSlots = data.slots||[];
          const builtTeams = rawTeams.map(t=>({
            ...t,
            slots: rawSlots.filter(s=>s.teamId===t.id).map(s=>({
              ...s,
              cap:Number(s.cap),
              hours:Number(s.hours),
              on: s.on===true||s.on==="TRUE"||s.on==="true"
            }))
          }));
          setManagersRaw(data.managers||[]);
          setTeamsRaw(builtTeams);
          setSlotsRaw(rawSlots);
          setEmpsRaw(data.employees||[]);
          // Rebuild shifts as {key: {t,sid}}
          const shiftMap={};
          (data.shifts||[]).forEach(s=>{
            if(s.shiftKey) shiftMap[s.shiftKey]={t:s.type,sid:s.slotId||""};
          });
          setShiftsRaw(shiftMap);
          setOtReqsRaw((data.ot||[]).map(o=>({...o,year:Number(o.year),month:Number(o.month),day:Number(o.day),hours:Number(o.hours)})));
          setHolidaysRaw(data.holidays||[]);
          const rawSt = data.settings||{};
          setSettingsRaw({workdays: rawSt.workdays ? JSON.parse(rawSt.workdays) : [0,1,2,3,4,5,6]});
          setLeavesRaw((data.leaves||[]).map(l=>({...l,year:Number(l.year),month:Number(l.month),day:Number(l.day)})));
          setLoadState("ready");
        } catch(e) {
          setLoadError(e.message);
          setLoadState("error");
        }
      },[]);

      useEffect(()=>{ loadData(); },[]);
      useEffect(()=>{ document.body.className=darkMode?"dark-mode":"light-mode"; localStorage.setItem("rattana_theme",darkMode?"dark":"light"); },[darkMode]);
      const toggleTheme=()=>setDarkMode(d=>!d);

      // ── API-synced setters ──
      const doSave = useCallback(async (action, payload) => {
        setSaving(true);
        await saveToSheets(action, payload);
        setTimeout(()=>setSaving(false), 1000);
      },[]);

      const setTeams = useCallback((updater) => {
        setTeamsRaw(prev => {
          const next = typeof updater==="function" ? updater(prev) : updater;
          // Sync added/changed teams
          next.forEach(t => {
            const old = prev.find(p=>p.id===t.id);
            if(!old||old.name!==t.name) doSave("setTeam",{team:{id:t.id,name:t.name}});
            // Sync slots
            (t.slots||[]).forEach(s=>{
              const os=(old?.slots||[]).find(p=>p.id===s.id);
              if(!os||JSON.stringify(os)!==JSON.stringify(s)) doSave("setSlot",{slot:{...s,teamId:t.id}});
            });
            // Removed slots
            (old?.slots||[]).forEach(s=>{
              if(!(t.slots||[]).find(n=>n.id===s.id)) doSave("removeSlot",{id:s.id});
            });
          });
          // Removed teams
          prev.forEach(t=>{ if(!next.find(n=>n.id===t.id)) doSave("removeTeam",{id:t.id}); });
          return next;
        });
      },[doSave]);

      const setEmps = useCallback((updater) => {
        setEmpsRaw(prev => {
          const next = typeof updater==="function" ? updater(prev) : updater;
          next.forEach(e => {
            const old = prev.find(p=>p.id===e.id);
            if(!old||JSON.stringify(old)!==JSON.stringify(e)) doSave("setEmployee",{employee:e});
          });
          prev.forEach(e=>{ if(!next.find(n=>n.id===e.id)) doSave("removeEmployee",{id:e.id}); });
          return next;
        });
      },[doSave]);

      const setShifts = useCallback((newShifts) => {
        setShiftsRaw(prev => {
          const changed=[];
          Object.entries(newShifts).forEach(([key,val])=>{
            if(JSON.stringify(prev[key])!==JSON.stringify(val)){
              const [empId,year,month,day]=key.split("-");
              changed.push({shiftKey:key,empId,year:Number(year),month:Number(month),day:Number(day),type:val.t,slotId:val.sid||""});
            }
          });
          if(changed.length) doSave("bulkSetShifts",{shifts:changed});
          return newShifts;
        });
      },[doSave]);

      const setOtReqs = useCallback((updater) => {
        setOtReqsRaw(prev => {
          const next = typeof updater==="function" ? updater(prev) : updater;
          next.forEach(o => {
            const old = prev.find(p=>p.id===o.id);
            if(!old) doSave("setOT",{ot:o});
            else if(old.status!==o.status) doSave("updateOTStatus",{id:o.id,status:o.status,approvedBy:o.approvedBy||""});
          });
          return next;
        });
      },[doSave]);

      // ── Derived ──
      // ── Holiday setter ──────────────────────────────────────
      const setHolidays = useCallback((updater) => {
        setHolidaysRaw(prev => {
          const next = typeof updater==="function" ? updater(prev) : updater;
          next.forEach(h => { const old=prev.find(p=>p.id===h.id); if(!old||JSON.stringify(old)!==JSON.stringify(h)) doSave("setHoliday",{holiday:h}); });
          prev.forEach(h => { if(!next.find(n=>n.id===h.id)) doSave("removeHoliday",{id:h.id}); });
          return next;
        });
      },[doSave]);

      // ── Workdays setter ──────────────────────────────────────
      const setWorkdays = useCallback((days) => {
        setSettingsRaw(prev=>({...prev,workdays:days}));
        doSave("setSettings",{key:"workdays",value:JSON.stringify(days)});
      },[doSave]);

      // ── Leaves setter ──────────────────────────────────────
      const setLeaves = useCallback((updater) => {
        setLeavesRaw(prev => {
          const next = typeof updater==="function" ? updater(prev) : updater;
          next.forEach(l => { const old=prev.find(p=>p.id===l.id); if(!old) doSave("setLeave",{leave:l}); else if(old.status!==l.status) doSave("updateLeaveStatus",{id:l.id,status:l.status,approvedBy:l.approvedBy||""}); });
          prev.forEach(l => { if(!next.find(n=>n.id===l.id)) doSave("removeLeave",{id:l.id}); });
          return next;
        });
      },[doSave]);

      const allSlots = teams.flatMap(t=>t.slots||[]);
      const getSlot  = useCallback(sid=>allSlots.find(s=>s.id===sid),[allSlots]);
      // วันหยุดนักขัตฤกษ์
      const getHoliday = useCallback((y,m,d)=>{
        const dateStr=`${y}-${pad2(m)}-${pad2(d)}`;
        return holidays.find(h=>h.date===dateStr);
      },[holidays]);
      // ลาของพนักงาน
      const getLeave = useCallback((empId,y,m,d)=>
        leaves.find(l=>String(l.empId)===String(empId)&&l.year===y&&l.month===m&&l.day===d)
      ,[leaves]);
      // วันบังคับทำงาน
      const isMandatory = useCallback((y,m,d)=>settings.workdays.includes(new Date(y,m-1,d).getDay()),[settings]);
      const now = new Date();
      const getShift = (eid,y,m,d) => shifts[`${eid}-${y}-${String(m).padStart(2,"0")}-${String(d).padStart(2,"0")}`];
      const setShift = (eid,y,m,d,v) => {
        const key=`${eid}-${y}-${String(m).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
        setShifts({...shifts,[key]:v});
      };
      const slotCount=(sid,y,m,d)=>emps.filter(e=>e.status==="active"&&getShift(e.id,y,m,d)?.t==="work"&&getShift(e.id,y,m,d)?.sid===sid).length;
      const activeEmps=emps.filter(e=>e.status==="active");
      const dim=new Date(period.year,period.month,0).getDate();
      const pDays=period.half==="1-15"?Array.from({length:15},(_,i)=>i+1):Array.from({length:dim-15},(_,i)=>i+16);

      if(loadState==="loading") return <LoadingScreen/>;
      if(loadState==="error") return <ErrorScreen message={loadError} onRetry={loadData}/>;

      const cp={managers,period,setPeriod,teams,setTeams,emps,setEmps,activeEmps,shifts,setShifts,otReqs,setOtReqs,pDays,getShift,setShift,slotCount,getSlot,allSlots,showToast,holidays,setHolidays,settings,setWorkdays,leaves,setLeaves,getHoliday,getLeave,isMandatory,currentUser:user};
      const mbProps={period,setPeriod,shifts,emps,setShifts,showToast};

      if(!role) return (
        <>
          <style>{CSS}</style>
          <LoginScreen activeEmps={activeEmps} managers={managers}
            onManager={(mgrObj,pwd)=>{
              const ok = mgrObj ? String(mgrObj.pwd)===String(pwd) : (managers.length===0&&String(pwd)==="admin1234");
              if(ok){setRole("manager");setUser(mgrObj||{name:"ผู้จัดการ",id:"MGR001"});setTab("schedule");return true;}
              return false;
            }}
            onEmployee={(emp,pwd)=>{ if(String(emp.pwd)===String(pwd)){setRole("employee");setUser(emp);setTab("calendar");return true;} return false; }}
          />
        </>
      );

      return (
        <div className="wrap">
          <style>{CSS}</style>
          {toast&&<Toast msg={toast.msg} type={toast.type}/>}
          <SavingBadge saving={saving}/>
          <Header role={role} user={user} onLogout={()=>{setRole(null);setUser(null);}} darkMode={darkMode} toggleTheme={toggleTheme} onRefresh={loadData}/>
          {role==="manager"
            ?<ManagerApp tab={tab} setTab={setTab} mbProps={mbProps} {...cp}/>
            :<EmployeeApp tab={tab} setTab={setTab} employee={user} mbProps={mbProps} {...cp}/>
          }
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));


/* ═══════════════════ STYLES ═══════════════════ */
const CSS = `
@import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&family=Playfair+Display:wght@700&display=swap');
/* ── DARK MODE (default) ── */
body.dark-mode, body:not(.light-mode) {
  --nd:#0a1628;--n:#0f2347;--nm:#1a3a6e;--nl:#1e4d8c;
  --g:#c9a227;--gl:#e8c547;--w:#fff;--gr:#9aabb8;
  --ok:#2ecc71;--err:#e74c3c;--warn:#f39c12;
  --sg:0 2px 15px rgba(201,162,39,.35);
  --bg-main:#0a1628;--bg-card:rgba(255,255,255,.04);--bg-input:rgba(255,255,255,.06);
  --border-card:rgba(201,162,39,.15);--border-input:rgba(201,162,39,.2);
  --text-main:#fff;--text-sub:#9aabb8;
  --table-bg:#0a1628;--table-th:rgba(201,162,39,.15);
  --hdr-bg:linear-gradient(90deg,#0a1628,#1a3a6e);
  --login-bg:linear-gradient(135deg,#0a1628,#0f2347 60%,#0c1e40);
}
/* ── LIGHT MODE ── */
body.light-mode {
  --nd:#f0f4f8;--n:#e8eef5;--nm:#dce6f0;--nl:#c5d5e8;
  --g:#b8860b;--gl:#d4a017;--w:#1a2332;--gr:#4a6080;
  --ok:#1a8a4a;--err:#c0392b;--warn:#e67e22;
  --sg:0 2px 15px rgba(184,134,11,.2);
  --bg-main:#f0f4f8;--bg-card:#fff;--bg-input:#fff;
  --border-card:rgba(184,134,11,.2);--border-input:rgba(184,134,11,.25);
  --text-main:#1a2332;--text-sub:#4a6080;
  --table-bg:#f8fafc;--table-th:rgba(184,134,11,.1);
  --hdr-bg:linear-gradient(90deg,#1a2d4a,#2a4a7a);
  --login-bg:linear-gradient(135deg,#dce6f0,#e8eef5 60%,#d5e2ee);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Sarabun',sans-serif;background:var(--bg-main);color:var(--text-main);min-height:100vh;transition:background .3s,color .3s;}
.wrap{min-height:100vh;background:var(--bg-main);}
.hdr{background:var(--hdr-bg);border-bottom:2px solid var(--g);padding:0 24px;height:64px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 20px rgba(0,0,0,.2);}
.hlogo{width:40px;height:40px;background:linear-gradient(135deg,var(--g),var(--gl));border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:900;color:#0a1628;font-family:'Playfair Display',serif;}
.upill{display:flex;align-items:center;gap:8px;background:rgba(201,162,39,.15);border:1px solid rgba(201,162,39,.3);border-radius:20px;padding:6px 14px;font-size:13px;color:var(--gl);cursor:pointer;}
.upill:hover{background:rgba(201,162,39,.25);}
.tabs{display:flex;gap:4px;padding:16px 24px 0;border-bottom:1px solid var(--border-card);overflow-x:auto;background:var(--bg-main);}
.tab{padding:10px 18px;border:none;background:transparent;color:var(--gr);font-family:'Sarabun',sans-serif;font-size:14px;font-weight:600;cursor:pointer;border-radius:8px 8px 0 0;border-bottom:3px solid transparent;transition:all .2s;white-space:nowrap;}
.tab:hover{color:var(--text-main);background:rgba(201,162,39,.06);}
.tab.on{color:var(--g);border-bottom:3px solid var(--g);background:rgba(201,162,39,.08);}
.body{padding:20px 24px;max-width:1400px;margin:0 auto;}
/* MONTH BAR */
.mbar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:14px;}
.mnav{display:flex;align-items:center;gap:0;background:var(--bg-card);border:1px solid var(--border-input);border-radius:10px;overflow:hidden;}
.mnavbtn{padding:7px 11px;border:none;background:transparent;color:var(--gr);cursor:pointer;font-size:15px;transition:all .15s;}
.mnavbtn:hover{background:rgba(201,162,39,.1);color:var(--g);}
.mnavbtn:disabled{opacity:.3;cursor:default;}
.mcur{padding:7px 16px;font-family:'Sarabun',sans-serif;font-size:14px;font-weight:700;color:var(--gl);white-space:nowrap;min-width:120px;text-align:center;}
.mpills{display:flex;gap:5px;}
.mpill{padding:6px 14px;border:none;border-radius:8px;font-family:'Sarabun',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;}
.mpill.cur{background:var(--nm);color:var(--text-main);border:1px solid var(--border-input);}
.mpill.off{background:transparent;border:1px solid var(--border-input);color:var(--gr);}
.mpill.fut{border:1px solid rgba(243,156,18,.3);color:#f5c842;background:rgba(243,156,18,.07);}
.mpill:hover{border-color:var(--g);color:var(--g);}
/* HALF TOGGLE */
.htog{display:flex;gap:0;background:var(--bg-card);border:1px solid var(--border-input);border-radius:10px;overflow:hidden;}
.hbtn{padding:7px 18px;border:none;font-family:'Sarabun',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;color:var(--gr);background:transparent;}
.hbtn.on{background:var(--g);color:#0a1628;}
/* CARD */
.card{background:var(--bg-card);border:1px solid var(--border-card);border-radius:16px;padding:20px;}
.ctit{font-size:16px;font-weight:700;color:var(--g);margin-bottom:14px;}
/* COPY BANNER */
.copybanner{background:rgba(243,156,18,.1);border:1px solid rgba(243,156,18,.3);border-radius:12px;padding:14px 18px;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;}
/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:5px;padding:8px 16px;border:none;border-radius:10px;font-family:'Sarabun',sans-serif;font-size:14px;font-weight:600;cursor:pointer;transition:all .2s;}
.bg{background:linear-gradient(135deg,var(--g),var(--gl));color:#0a1628;}
.bg:hover{transform:translateY(-1px);box-shadow:var(--sg);}
.bo{background:transparent;border:1px solid rgba(201,162,39,.4);color:var(--g);}
.bo:hover{background:rgba(201,162,39,.1);}
.bd{background:#8B0000;color:#fff;}
.bd:hover{background:#a00000;}

/* ═══════════════════ TIME / DATE HELPERS ═══════════════════ */
const pad2 = n => String(n).padStart(2,"0");
const LEAVE_LABEL = {sick:"ลาป่วย",personal:"ลากิจ",vacation:"ลาพักร้อน"};
const LEAVE_ICON  = {sick:"🏥",personal:"📋",vacation:"🌴"};
const LEAVE_TYPE_OPTIONS = [
  {type:"sick",    label:"🏥 ลาป่วย"},
  {type:"personal",label:"📋 ลากิจ"},
  {type:"vacation",label:"🌴 ลาพักร้อน"},
];
const addHrs = (t, h) => { const [hr,mn]=t.split(":").map(Number); return `${pad2(hr+h)}:${pad2(mn)}`; };
const thaiT = t => t ? `${t} น.` : "–";
const thaiTex = t => t ? `${t}:00 น.` : "";
    // แก้ bug 1899 — Google Sheets ส่งเวลามาเป็น ISO date string
    const cleanTime = (val) => {
      if (!val) return "";
      const s = String(val);
      // "1899-12-30T06:00:00.000Z" → "06:00"
      if (s.includes("T") && s.length > 10) {
        const tp = s.split("T")[1] || "";
        const parts = tp.split(":");
        if (parts.length >= 2) return `${parts[0].padStart(2,"0")}:${parts[1].padStart(2,"0")}`;
      }
      // Already "06:00" format
      if (/^\d{1,2}:\d{2}/.test(s)) return s.substring(0,5);
      return s;
    };
    const thaiTC = t => { const c=cleanTime(t); return c ? `${c} น.` : "–"; };
const daysInMo = (m1, y) => new Date(y, m1, 0).getDate(); // m1 = 1-indexed

// Shift key: "empId-YYYY-MM-DD"
const SK = (eid, y, m, d) => `${eid}-${y}-${pad2(m)}-${pad2(d)}`;

// Get days for a period half
const halfDays = (y, m, half) => {
  const dim = daysInMo(m, y);
  return half === "1-15"
    ? Array.from({length:15}, (_,i) => i+1)
    : Array.from({length: dim-15}, (_,i) => i+16);
};

// Available months: current + 2 ahead
const getAvailMonths = () => {
  const res = [];
  for (let i = 0; i < 3; i++) {
    let m = now.getMonth() + 1 + i; // 1-indexed
    let y = now.getFullYear();
    if (m > 12) { m -= 12; y++; }
    res.push({ year:y, month:m });
  }
  return res;
};

// Previous period for copy source
const prevPeriod = (y, m, half) => {
  if (half === "16-end") return { year:y, month:m, half:"1-15" };
  // half === "1-15": go to previous month's 16-end
  let pm = m - 1, py = y;
  if (pm < 1) { pm = 12; py--; }
  return { year:py, month:pm, half:"16-end" };
};

// Check if a period has any shift data
const periodHasData = (shifts, emps, y, m, half) => {
  const days = halfDays(y, m, half);
  return emps.some(e => days.some(d => shifts[SK(e.id, y, m, d)]));
};

// Copy shifts by weekday mapping from source period to target period
const copyByWeekday = (shifts, emps, src, tgt) => {
  const sDays = halfDays(src.year, src.month, src.half);
  const tDays = halfDays(tgt.year, tgt.month, tgt.half);
  const newShifts = { ...shifts };

  emps.forEach(e => {
    // Build weekday → shift map from source
    const wdMap = {};
    sDays.forEach(d => {
      const sh = shifts[SK(e.id, src.year, src.month, d)];
      if (sh) {
        const wd = new Date(src.year, src.month-1, d).getDay(); // 0=Sun
        wdMap[wd] = sh;
      }
    });

    // Apply to target days using same weekday
    tDays.forEach(d => {
      const key = SK(e.id, tgt.year, tgt.month, d);
      if (!newShifts[key]) { // don't overwrite existing
        const wd = new Date(tgt.year, tgt.month-1, d).getDay();
        if (wdMap[wd] !== undefined) {
          newShifts[key] = { ...wdMap[wd] };
        }
      }
    });
  });
  return newShifts;
};

// Seed current month (April 2026) with sample data by weekday pattern
function seedShifts(emps, teams) {
  const s = {};
  const y = now.getFullYear(), m = now.getMonth()+1;
  const dim = daysInMo(m, y);
  emps.forEach(e => {
    const tm = teams.find(t=>t.id===e.teamId);
    const slots = tm?.slots?.filter(s=>s.on) || [];
    if (!slots.length) return;
    for (let d=1; d<=dim; d++) {
      const wd = new Date(y, m-1, d).getDay();
      if (wd === 0) { s[SK(e.id,y,m,d)] = { t:"off" }; } // Sunday off
      else { s[SK(e.id,y,m,d)] = { t:"work", sid: slots[wd % slots.length].id }; }
    }
  });
  return s;
}

/* ═══════════════════ MONTH SELECTOR BAR ═══════════════════ */
function MonthBar({ period, setPeriod, shifts, emps, setShifts, showToast }) {
  const avail = getAvailMonths();
  const { year, month, half } = period;
  const curIdx = avail.findIndex(a => a.year===year && a.month===month);

  const activeEmps = emps.filter(e=>e.status==="active");

  const navigate = (newYear, newMonth) => {
    const newPeriod = { year:newYear, month:newMonth, half };
    // Check if target period has data
    const hasCur = periodHasData(shifts, activeEmps, newYear, newMonth, half);
    if (!hasCur) {
      // Auto-copy from previous period
      const src = prevPeriod(newYear, newMonth, half);
      const hasSrc = periodHasData(shifts, activeEmps, src.year, src.month, src.half);
      if (hasSrc) {
        const copied = copyByWeekday(shifts, activeEmps, src, {year:newYear, month:newMonth, half});
        setShifts(copied);
        showToast(`คัดลอกตารางจาก ${THAI_MONTHS[src.month-1]} → ${THAI_MONTHS[newMonth-1]} โดยวันในสัปดาห์ ✓`);
      }
    }
    setPeriod(newPeriod);
  };

  const setHalf = (h) => {
    const newPeriod = { year, month, half:h };
    const activeEmps2 = emps.filter(e=>e.status==="active");
    const hasCur = periodHasData(shifts, activeEmps2, year, month, h);
    if (!hasCur) {
      const src = prevPeriod(year, month, h);
      const hasSrc = periodHasData(shifts, activeEmps2, src.year, src.month, src.half);
      if (hasSrc) {
        const copied = copyByWeekday(shifts, activeEmps2, src, {year, month, half:h});
        setShifts(copied);
        showToast(`คัดลอกตารางโดยวันในสัปดาห์ ✓`);
      }
    }
    setPeriod(newPeriod);
  };

  const isCurrent = (y,m) => y===now.getFullYear() && m===now.getMonth()+1;
  const isFuture = (y,m) => new Date(y,m-1,1) > new Date(now.getFullYear(),now.getMonth(),1);

  return (
    <div className="mbar">
      {/* Month navigation */}
      <div className="mnav">
        <button className="mnavbtn" disabled={curIdx<=0} onClick={()=>curIdx>0&&navigate(avail[curIdx-1].year,avail[curIdx-1].month)}>◀</button>
        <div className="mcur">
          {THAI_MONTHS[month-1]}<br/>
          <span style={{fontSize:11,color:"var(--gr)",fontWeight:400}}>{year+543}</span>
        </div>
        <button className="mnavbtn" disabled={curIdx>=avail.length-1} onClick={()=>curIdx<avail.length-1&&navigate(avail[curIdx+1].year,avail[curIdx+1].month)}>▶</button>
      </div>

      {/* Month pills */}
      <div className="mpills">
        {avail.map((a,i) => {
          const active = a.year===year && a.month===month;
          const cls = active?"mpill cur":isFuture(a.year,a.month)?"mpill fut":"mpill off";
          return (
            <button key={i} className={cls} onClick={()=>navigate(a.year,a.month)}>
              {THAI_MONTHS[a.month-1].slice(0,3)}{isFuture(a.year,a.month)?" 📅":""}
            </button>
          );
        })}
      </div>

      {/* Half toggle */}
      <div className="htog">
        <button className={`hbtn ${half==="1-15"?"on":""}`} onClick={()=>setHalf("1-15")}>1–15</button>
        <button className={`hbtn ${half==="16-end"?"on":""}`} onClick={()=>setHalf("16-end")}>
          16–{daysInMo(month, year)}
        </button>
      </div>

      {/* Period label */}
      <div style={{fontSize:12,color:"var(--gr)"}}>
        {isCurrent(year,month)?"เดือนปัจจุบัน":isFuture(year,month)?
          <span style={{color:"#f5c842",fontWeight:600}}>📅 วางแผนล่วงหน้า</span>:"ประวัติ"}
      </div>
    </div>
  );
}

const TEAM_COLORS=[
  {bg:"rgba(30,120,200,.25)",border:"rgba(30,120,200,.6)",text:"#7dc1ff"},
  {bg:"rgba(39,174,96,.2)",border:"rgba(39,174,96,.6)",text:"#68d49e"},
  {bg:"rgba(142,68,173,.2)",border:"rgba(142,68,173,.6)",text:"#c39bd3"},
  {bg:"rgba(230,126,34,.2)",border:"rgba(230,126,34,.6)",text:"#f0a500"},
  {bg:"rgba(26,188,156,.2)",border:"rgba(26,188,156,.6)",text:"#76d7c4"},
  {bg:"rgba(231,76,60,.2)",border:"rgba(231,76,60,.5)",text:"#ff9090"},
];
function getTeamColor(teamId,teams){const idx=teams.findIndex(t=>t.id===teamId);return TEAM_COLORS[Math.max(0,idx)%TEAM_COLORS.length];}

/* ═══════════════════ SCHEDULE GRID ═══════════════════ */
function ScheduleGrid({period,pDays,emps,activeEmps,teams,getShift,setShift,slotCount,getSlot,showToast,isManager,otReqs,leaves,setLeaves,setShifts,holidays,getHoliday,getLeave,isMandatory}) {
  const [ec, setEc] = useState(null);
  const [filterTeam, setFilterTeam] = useState("all");
  const {year:y, month:m} = period;
  const filteredEmps = filterTeam==="all"?activeEmps:activeEmps.filter(e=>e.teamId===filterTeam);

  const getEmpSlots = eid => {
    const emp = emps.find(e=>e.id===eid);
    return teams.find(t=>t.id===emp?.teamId)?.slots?.filter(s=>s.on) || [];
  };

  const doSet = (type, sid) => {
    if(!ec) return;
    if(type==="work") {
      const cnt = slotCount(sid, y, m, ec.day);
      const slot = getSlot(sid);
      if(!isManager && cnt>=slot?.cap) { showToast("กะนี้เต็มแล้ว","warning"); return; }
      setShift(ec.eid, y, m, ec.day, {t:"work",sid});
      showToast("บันทึกกะสำเร็จ ✓");
    } else if(type==="absent") {
      setShift(ec.eid, y, m, ec.day, {t:"absent",sid:""});
      showToast("บันทึกขาดงานเรียบร้อย ✓");
    } else {
      setShift(ec.eid, y, m, ec.day, {t:"off"});
      showToast("บันทึกวันหยุดสำเร็จ ✓");
    }
    setEc(null);
  };

  const offTotal = activeEmps.reduce((s,e)=>s+pDays.filter(d=>getShift(e.id,y,m,d)?.t==="off").length,0);
  const STICKYB = "var(--table-bg, #0a1628)";

  return (
    <div>
      <div className="srow">
        <div className="sbox"><div className="snum">{activeEmps.length}</div><div className="slbl">พนักงาน</div></div>
        <div className="sbox"><div className="snum">{teams.length}</div><div className="slbl">ทีม</div></div>
        <div className="sbox"><div className="snum">{pDays.length}</div><div className="slbl">วัน</div></div>
        <div className="sbox"><div className="snum" style={{color:"#ff9090"}}>{offTotal}</div><div className="slbl">วันหยุดรวม</div></div>
        <div className="sbox"><div className="snum" style={{color:"#f5c842"}}>{otReqs?.filter(o=>o.status==="pending"&&o.year===y&&o.month===m).length||0}</div><div className="slbl">OT รอ</div></div>
      </div>
      {/* Team filter */}
      <div style={{display:"flex",gap:6,marginBottom:12,flexWrap:"wrap",alignItems:"center"}}>
        <span style={{fontSize:12,color:"var(--gr)",fontWeight:600}}>กรองทีม:</span>
        <button className={`btn sm ${filterTeam==="all"?"bg":"bo"}`} onClick={()=>setFilterTeam("all")}>ทั้งหมด ({activeEmps.length})</button>
        {teams.map(t=>{const tc=getTeamColor(t.id,teams);const cnt=activeEmps.filter(e=>e.teamId===t.id).length;return(
          <button key={t.id} onClick={()=>setFilterTeam(filterTeam===t.id?"all":t.id)}
            style={{padding:"5px 12px",border:`1px solid ${filterTeam===t.id?tc.border:"rgba(255,255,255,.15)"}`,borderRadius:8,background:filterTeam===t.id?tc.bg:"transparent",color:filterTeam===t.id?tc.text:"var(--gr)",fontFamily:"Sarabun,sans-serif",fontSize:12,fontWeight:600,cursor:"pointer",transition:"all .2s"}}>
            {t.name} ({cnt})
          </button>
        );})}
      </div>
      <div className="card">
        <div style={{overflowX:"auto"}}>
          <table className="stbl">
            <thead>
              <tr>
                <th style={{textAlign:"left",minWidth:85,position:"sticky",left:0,zIndex:4,background:STICKYB}}>พนักงาน</th>
                <th style={{minWidth:65,position:"sticky",left:90,zIndex:4,background:STICKYB}}>ทีม</th>
                {pDays.map(d=>{
                  const wd=new Date(y,m-1,d).getDay();
                  const isToday=y===now.getFullYear()&&m===now.getMonth()+1&&d===now.getDate();
                  const hdMgr=getHoliday?getHoliday(y,m,d):null;
                  return(
                    <th key={d} style={{...(isToday?{background:"rgba(201,162,39,.3)"}:{}),...(hdMgr?{background:"rgba(243,156,18,.15)"}:{})}}>

                      {d}<span className="wdcol">{THAI_DAYS_SHORT[wd]}</span>
                      {hdMgr&&<span style={{fontSize:8,display:"block",color:"#f5c842"}}>{(hdMgr.name||"").slice(0,4)}</span>}
                    </th>
                  );
                })}
              </tr>
            </thead>
            <tbody>
              {filteredEmps.map(emp=>{
                const tc=getTeamColor(emp.teamId,teams);
                return(
                  <tr key={emp.id}>
                    <td className="ename" style={{position:"sticky",left:0,zIndex:2,background:STICKYB,borderLeft:`3px solid ${tc.border}`}}>
                      <div>{emp.nick}</div><div style={{fontSize:10,color:"var(--gr)"}}>{emp.name}</div>
                    </td>
                    <td style={{position:"sticky",left:90,zIndex:2,background:STICKYB}}>
                      <span className="tag" style={{fontSize:10,background:tc.bg,color:tc.text,border:`1px solid ${tc.border}`}}>{teams.find(t=>t.id===emp.teamId)?.name||"–"}</span>
                    </td>
                    {pDays.map(d=>{
                      const sh=getShift(emp.id,y,m,d);
                      const slot=sh?.t==="work"?getSlot(sh.sid):null;
                      const hasOt=otReqs?.some(o=>(o.eid===emp.id||o.empId===emp.id)&&o.day===d&&o.year===y&&o.month===m&&o.status==="approved");
                      const isToday=y===now.getFullYear()&&m===now.getMonth()+1&&d===now.getDate();
                      const isAbsent=sh?.t==="absent";
                      return(
                        <td key={d} style={isToday?{background:"rgba(201,162,39,.05)"}:{}}>
                          <span
                            onClick={()=>isManager&&setEc({eid:emp.id,day:d})}
                            style={{cursor:isManager?"pointer":"default",display:"inline-block",padding:"3px 6px",borderRadius:5,fontSize:11,fontWeight:600,
                              ...(isAbsent?{background:"rgba(120,0,0,.5)",border:"1px solid #8B0000",color:"#ff4444"}:
                                sh?.t==="off"?{background:"rgba(231,76,60,.2)",border:"1px solid rgba(231,76,60,.3)",color:"#ff9090"}:
                                sh?.t==="leave"?{background:"rgba(230,126,34,.15)",border:"1px solid rgba(230,126,34,.3)",color:"#e67e22"}:
                                sh?.t==="work"?{background:"rgba(30,77,140,.6)",border:"1px solid rgba(30,120,200,.4)",color:"#7dc1ff"}:
                                {background:"rgba(255,255,255,.04)",border:"1px solid rgba(255,255,255,.1)",color:"var(--gr)"})
                            }}>
                            {isAbsent?"❌ ขาด":sh?.t==="off"?"หยุด":sh?.t==="leave"?((LEAVE_ICON[sh.leaveType]||"📋")+" "+(LEAVE_LABEL[sh.leaveType]||"ลา").slice(0,3)):sh?.t==="work"?(cleanTime(slot?.start)||"?"):" – "}
                          </span>
                          {hasOt&&<div style={{fontSize:9,color:"#f5c842"}}>OT✓</div>}
                        </td>
                      );
                    })}
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      </div>

      {ec&&(
        <div className="mover" onClick={()=>setEc(null)}>
          <div className="modal" onClick={e=>e.stopPropagation()}>
            <div className="mtit">
              {isManager?"👔 แก้ไขกะ":"เลือกกะ"} — {ec.day} {THAI_MONTHS[m-1]} {y+543}
              <div style={{fontSize:12,fontWeight:400,color:"var(--gr)",marginTop:2}}>
                {THAI_DAYS_FULL[new Date(y,m-1,ec.day).getDay()]} • {emps.find(e=>e.id===ec.eid)?.name}
              </div>
            </div>
            {isManager&&<div className="al ai" style={{marginBottom:12}}>👔 ผู้จัดการสามารถกำหนดกะได้ไม่จำกัด</div>}
            <button className="dob" onClick={()=>doSet("off")}>🏖️ วันหยุด (Day Off)</button>
            {isManager&&<button className="dob" style={{borderColor:"rgba(192,57,43,.4)",background:"rgba(192,57,43,.08)",color:"#ff9090"}} onClick={()=>doSet("absent")}>❌ บันทึกขาดงาน</button>}
            <div className="div"/>
            <div style={{fontSize:12,color:"var(--gr)",marginBottom:9,fontWeight:600}}>
              เลือกกะ ({teams.find(t=>t.id===emps.find(e=>e.id===ec.eid)?.teamId)?.name||"–"})
            </div>
            <div className="slgrid">
              {getEmpSlots(ec.eid).map(slot=>{
                const cnt=slotCount(slot.id,y,m,ec.day);
                const over=!isManager&&cnt>=slot.cap;
                const cur=getShift(ec.eid,y,m,ec.day)?.sid===slot.id;
                return(
                  <div key={slot.id} className={`slcard ${cur?"sel":""} ${over?"full":""}`} onClick={()=>!over&&doSet("work",slot.id)}>
                    <div className="sltime">{thaiTC(slot.start)}<br/><span style={{fontSize:9,color:"var(--gr)"}}>↓ {slot.hours} ชม.</span><br/>{thaiTC(slot.end)}</div>
                    <div style={{fontSize:11,color:"var(--gr)",marginTop:3}}>{cnt}/{slot.cap} คน</div>
                    {over&&<div style={{color:"var(--err)",fontSize:11,fontWeight:700}}>เต็ม</div>}
                    {isManager&&cnt>=slot.cap&&<div style={{color:"var(--warn)",fontSize:10}}>⚠ เกิน</div>}
                    {cur&&<div style={{color:"var(--g)",fontSize:11,fontWeight:700}}>✓</div>}
                  </div>
                );
              })}
            </div>
            <div className="mfoot"><button className="btn bo" onClick={()=>setEc(null)}>ปิด</button></div>
          </div>
        </div>
      )}
    </div>
  );
}

/* ═══════════════════ TEAM & SLOT MANAGEMENT ═══════════════════ */
function TeamSlotMgmt({teams,setTeams,emps,setEmps,showToast,holidays,setHolidays,settings,setWorkdays}) {
  const [filter,setFilter]=useState("active");
  const [selTeam,setSelTeam]=useState(null);
  const [showAddTeam,setShowAddTeam]=useState(false);
  const [newTeamName,setNewTeamName]=useState("");
  const [showAddSlot,setShowAddSlot]=useState(false);
  const [newSlot,setNewSlot]=useState({start:"08:00",hours:9});
  const [newCap,setNewCap]=useState(2);
  const [showAddEmp,setShowAddEmp]=useState(false);
  const [editEmp,setEditEmp]=useState(null);
  const [resetE,setResetE]=useState(null);
  const [np,setNp]=useState(""); const [cp2,setCp2]=useState("");
  const [confLeave,setConfLeave]=useState(null);
  const blank={id:"",name:"",surname:"",nick:"",teamId:teams[0]?.id||"",gender:"นางสาว",pwd:"1234",status:"active",joined:now.toLocaleDateString("th-TH")};
  const [newEmp,setNewEmp]=useState({...blank});
  const shown=emps.filter(e=>filter==="all"?true:e.status===filter);

  const addTeam=()=>{
    if(!newTeamName.trim()){showToast("กรุณากรอกชื่อทีม","warning");return;}
    setTeams(p=>[...p,{id:`T${Date.now()}`,name:newTeamName.trim(),slots:[]}]);
    setNewTeamName("");setShowAddTeam(false);showToast("เพิ่มทีมสำเร็จ ✓");
  };
  const addSlot=()=>{
    if(!selTeam)return;
    const end=addHrs(newSlot.start,Number(newSlot.hours));
    const id=`${selTeam.id}S${Date.now()}`;
    setTeams(p=>p.map(t=>t.id===selTeam.id?{...t,slots:[...t.slots,{id,start:newSlot.start,hours:Number(newSlot.hours),end,cap:Number(newCap),on:true}]}:t));
    setShowAddSlot(false);showToast("เพิ่มกะสำเร็จ ✓");
  };
  const addEmp=()=>{
    if(!newEmp.id||!newEmp.name){showToast("กรุณากรอกข้อมูลให้ครบ","warning");return;}
    if(emps.find(e=>e.id===newEmp.id)){showToast("รหัสพนักงานซ้ำ","warning");return;}
    if(!newEmp.pwd){showToast("กรุณาตั้งรหัสผ่าน","warning");return;}
    setEmps(p=>[...p,{...newEmp}]);setNewEmp({...blank});setShowAddEmp(false);showToast("เพิ่มพนักงานสำเร็จ ✓");
  };
  const doReset=()=>{
    if(!np||np!==cp2){showToast("รหัสผ่านไม่ตรงกัน","warning");return;}
    setEmps(p=>p.map(e=>e.id===resetE.id?{...e,pwd:np}:e));setResetE(null);setNp("");setCp2("");showToast("รีเซ็ตรหัสผ่านสำเร็จ ✓");
  };
  const markLeave=id=>{
    setEmps(p=>p.map(e=>e.id===id?{...e,status:"inactive",left:now.toLocaleDateString("th-TH")}:e));
    setConfLeave(null);showToast("บันทึกการลาออกสำเร็จ");
  };

  return (
    <div>
      <div style={{display:"flex",justifyContent:"space-between",marginBottom:14,flexWrap:"wrap",gap:8}}>
        <h2 style={{color:"var(--g)",fontSize:20,fontWeight:800}}>จัดการทีมและกะ</h2>
        <button className="btn bg" onClick={()=>setShowAddTeam(true)}>+ เพิ่มทีมใหม่</button>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(310px,1fr))",gap:13,marginBottom:28}}>
        {teams.map(team=>(
          <div key={team.id} className="card">
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:11}}>
              <input value={team.name} onChange={e=>setTeams(p=>p.map(t=>t.id===team.id?{...t,name:e.target.value}:t))}
                style={{background:"transparent",border:"none",color:"var(--g)",fontSize:17,fontWeight:800,fontFamily:"Sarabun,sans-serif",width:"70%"}}/>
              <div style={{display:"flex",gap:6}}>
                <button className="btn bg sm" onClick={()=>{setSelTeam(team);setShowAddSlot(true);setNewSlot({start:"08:00",hours:9});setNewCap(2);}}>+ กะ</button>
                <button className="btn bd sm" onClick={()=>{
                  if(emps.some(e=>e.teamId===team.id&&e.status==="active")){showToast("มีพนักงานอยู่ในทีม","warning");return;}
                  setTeams(p=>p.filter(t=>t.id!==team.id));showToast("ลบทีมสำเร็จ");
                }}>🗑️</button>
              </div>
            </div>
            <div style={{fontSize:12,color:"var(--gr)",marginBottom:10}}>{emps.filter(e=>e.teamId===team.id&&e.status==="active").length} คน</div>
            {team.slots.length===0
              ?<div style={{color:"var(--gr)",fontSize:12,fontStyle:"italic"}}>ยังไม่มีกะ — กด "+ กะ" เพื่อเพิ่ม</div>
              :team.slots.map(slot=>(
                <div key={slot.id} style={{background:"rgba(255,255,255,.04)",border:"1px solid rgba(201,162,39,.12)",borderRadius:9,padding:"9px 11px",marginBottom:6,opacity:slot.on?1:.55}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:5}}>
                    <span style={{fontSize:14,fontWeight:800,color:"var(--gl)"}}>{thaiTC(slot.start)} – {thaiTC(slot.end)} <span style={{fontSize:11,color:"var(--gr)",fontWeight:400}}>({slot.hours} ชม.)</span></span>
                    <div style={{display:"flex",gap:4}}>
                      <button className={`btn sm ${slot.on?"bo":"bn"}`} onClick={()=>setTeams(p=>p.map(t=>t.id===team.id?{...t,slots:t.slots.map(s=>s.id===slot.id?{...s,on:!s.on}:s)}:t))}>{slot.on?"⏸":"▶"}</button>
                      <button className="btn bd sm" onClick={()=>{setTeams(p=>p.map(t=>t.id===team.id?{...t,slots:t.slots.filter(s=>s.id!==slot.id)}:t));showToast("ลบกะสำเร็จ");}}>🗑️</button>
                    </div>
                  </div>
                  <div style={{display:"flex",alignItems:"center",gap:7}}>
                    <label style={{fontSize:12,color:"var(--gr)",fontFamily:"Sarabun,sans-serif"}}>สูงสุด:</label>
                    <input type="number" min="1" max="20" value={slot.cap}
                      onChange={e=>setTeams(p=>p.map(t=>t.id===team.id?{...t,slots:t.slots.map(s=>s.id===slot.id?{...s,cap:Number(e.target.value)}:s)}:t))}
                      style={{width:55,background:"rgba(255,255,255,.06)",border:"1px solid rgba(201,162,39,.2)",borderRadius:6,padding:"3px 8px",color:"#fff",fontFamily:"Sarabun,sans-serif",fontSize:13,textAlign:"center"}}/>
                    <span style={{fontSize:12,color:"var(--g)",fontWeight:700}}>คน</span>
                  </div>
                </div>
              ))
            }
          </div>
        ))}
      </div>

      {/* EMPLOYEES */}
      <div style={{display:"flex",justifyContent:"space-between",marginBottom:12,flexWrap:"wrap",gap:8}}>
        <h2 style={{color:"var(--g)",fontSize:18,fontWeight:800}}>พนักงาน</h2>
        <button className="btn bg" onClick={()=>{setNewEmp({...blank,teamId:teams[0]?.id||""});setShowAddEmp(true);}}>+ เพิ่มพนักงาน</button>
      </div>
      <div style={{display:"flex",gap:5,marginBottom:12,background:"rgba(255,255,255,.04)",borderRadius:10,padding:4,width:"fit-content"}}>
        {[["active","ปัจจุบัน"],["inactive","ลาออกแล้ว"],["all","ทั้งหมด"]].map(([v,l])=>(
          <button key={v} style={{padding:"6px 14px",border:"none",borderRadius:7,fontFamily:"Sarabun,sans-serif",fontSize:13,fontWeight:600,cursor:"pointer",background:filter===v?"var(--g)":"transparent",color:filter===v?"var(--nd)":"var(--gr)",transition:"all .2s"}} onClick={()=>setFilter(v)}>{l}</button>
        ))}
      </div>
      <div className="egrid">
        {shown.map(emp=>(
          <div key={emp.id} className={`ecard ${emp.status==="inactive"?"inactive":""}`}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
              <div style={{width:36,height:36,borderRadius:"50%",background:emp.status==="active"?"linear-gradient(135deg,var(--g),var(--gl))":"rgba(154,171,184,.15)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,fontWeight:900,color:"var(--nd)"}}>
                {emp.nick?.[0]||"?"}

              <span className={`tag ${emp.status==="active"?"ta":"ti"}`}>{emp.status==="active"?"ทำงาน":"ลาออก"}</span>

            <div style={{fontSize:11,color:"var(--gr)"}}>รหัส: {emp.id}</div>
            <div style={{fontSize:14,fontWeight:700,marginTop:2}}>{emp.gender} {emp.name} {emp.surname}</div>
            <div style={{fontSize:12,color:"var(--g)"}}>"{emp.nick}"</div>
            <div style={{fontSize:11,color:"var(--gr)",marginTop:3}}>{teams.find(t=>t.id===emp.teamId)?.name||"–"}</div>
            {emp.joined&&<div style={{fontSize:10,color:"var(--gr)",marginTop:2}}>เริ่ม: {emp.joined}</div>}
            {emp.left&&<div style={{fontSize:10,color:"#ff9090",marginTop:1}}>ลาออก: {emp.left}</div>}
            <div style={{display:"flex",gap:5,marginTop:9,flexWrap:"wrap"}}>
              {emp.status==="active"?(
                <>
                  <button className="btn bn sm" onClick={()=>setEditEmp({...emp})}>✏️</button>
                  <button className="btn bn sm" onClick={()=>{setResetE(emp);setNp("");setCp2("");}}>🔑</button>
                  <button className="btn bw sm" onClick={()=>setConfLeave(emp)}>ลาออก</button>
                </>
              ):<button className="btn bs sm" onClick={()=>{setEmps(p=>p.map(e=>e.id===emp.id?{...e,status:"active",left:undefined}:e));showToast("กลับมาทำงานสำเร็จ ✓");}}>↩ กลับมา</button>}
            </div>
          </div>
        ))}
      </div>

      {/* MODALS */}
      {showAddTeam&&<SimpleModal title="+ เพิ่มทีมใหม่" onClose={()=>setShowAddTeam(false)} onSave={addTeam}>
        <div className="fg"><label className="fl">ชื่อทีม</label><input className="fi" value={newTeamName} onChange={e=>setNewTeamName(e.target.value)} placeholder="เช่น คลังสินค้า"/></div>
      </SimpleModal>}

      {showAddSlot&&selTeam&&(
        <div className="mover" onClick={()=>setShowAddSlot(false)}>
          <div className="modal" onClick={e=>e.stopPropagation()}>
            <div className="mtit">+ เพิ่มกะ — {selTeam.name}</div>
            <div className="fg"><label className="fl">เวลาเริ่มงาน (น.)</label><input type="time" className="fi" value={newSlot.start} onChange={e=>setNewSlot(p=>({...p,start:e.target.value}))}/></div>
            <div className="fg">
              <label className="fl">จำนวนชั่วโมงต่อกะ</label>
              <select className="fs" value={newSlot.hours} onChange={e=>setNewSlot(p=>({...p,hours:Number(e.target.value)}))}>
                <option value={9}>9 ชั่วโมง (มาตรฐาน)</option>
                <option value={10}>10 ชั่วโมง</option>
                <option value={11}>11 ชั่วโมง</option>
              </select>
            </div>
            <div className="fg">
              <label className="fl">เวลาออก (คำนวณอัตโนมัติ)</label>
              <div style={{background:"rgba(201,162,39,.08)",border:"1px solid rgba(201,162,39,.2)",borderRadius:8,padding:"9px 12px",fontSize:16,fontWeight:800,color:"var(--gl)"}}>{thaiT(addHrs(newSlot.start,Number(newSlot.hours)))}</div>
            </div>
            <div className="fg"><label className="fl">จำนวนสูงสุด (คน)</label><input type="number" min="1" max="20" className="fi" value={newCap} onChange={e=>setNewCap(e.target.value)}/></div>
            <div className="mfoot"><button className="btn bo" onClick={()=>setShowAddSlot(false)}>ยกเลิก</button><button className="btn bg" onClick={addSlot}>บันทึก</button></div>
          </div>
        </div>
      )}

      {showAddEmp&&<SimpleModal title="➕ เพิ่มพนักงานใหม่" onClose={()=>setShowAddEmp(false)} onSave={addEmp}>
        <EmpForm data={newEmp} setData={setNewEmp} teams={teams} showPwd/>
      </SimpleModal>}

      {editEmp&&<SimpleModal title="✏️ แก้ไขข้อมูล" onClose={()=>setEditEmp(null)} onSave={()=>{setEmps(p=>p.map(e=>e.id===editEmp.id?{...editEmp}:e));setEditEmp(null);showToast("บันทึกสำเร็จ ✓");}}>
        <EmpForm data={editEmp} setData={setEditEmp} teams={teams} disableId/>
      </SimpleModal>}

      {resetE&&<SimpleModal title={`🔑 รีเซ็ตรหัสผ่าน — ${resetE.name}`} onClose={()=>setResetE(null)} onSave={doReset}>
        <div className="fg"><label className="fl">รหัสผ่านใหม่</label><PwdInput value={np} onChange={e=>setNp(e.target.value)}/></div>
        <div className="fg"><label className="fl">ยืนยันรหัสผ่าน</label><PwdInput value={cp2} onChange={e=>setCp2(e.target.value)}/></div>
        {np&&cp2&&np!==cp2&&<div className="al ad">รหัสผ่านไม่ตรงกัน</div>}
      </SimpleModal>}

      <HolidayMgmt holidays={holidays||[]} setHolidays={setHolidays||(() =>{})} settings={settings||{workdays:[0,1,2,3,4,5,6]}} setWorkdays={setWorkdays||(() =>{})} showToast={showToast}/>

      {confLeave&&(
        <div className="mover" onClick={()=>setConfLeave(null)}>
          <div className="modal" onClick={e=>e.stopPropagation()}>
            <div className="mtit" style={{color:"#ff9090"}}>⚠️ ยืนยันการลาออก</div>
            <div className="al aw">พนักงานจะถูกย้ายเป็น "ลาออก" ประวัติยังคงอยู่ในระบบ</div>
            <div style={{fontWeight:700,padding:"10px 0"}}>{confLeave.name} {confLeave.surname} ({confLeave.id})</div>
            <div className="mfoot"><button className="btn bo" onClick={()=>setConfLeave(null)}>ยกเลิก</button><button className="btn bd" onClick={()=>markLeave(confLeave.id)}>ยืนยันลาออก</button></div>
          </div>
        </div>
      )}
    </div>
  );
}

function SimpleModal({title,onClose,onSave,children}) {

    <div className="mover" onClick={onClose}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <div className="mtit">{title}</div>
        {children}
        <div className="mfoot"><button className="btn bo" onClick={onClose}>ยกเลิก</button><button className="btn bg" onClick={onSave}>บันทึก</button></div>
      </div>
    </div>
  );
}

/* ═══════════════════ HOLIDAY & WORKDAYS MANAGEMENT ═══════════════════ */
const DAY_NAMES = ["อาทิตย์","จันทร์","อังคาร","พุธ","พฤหัส","ศุกร์","เสาร์"];
const leaveLabelShort = {sick:"ลาป่วย",personal:"ลากิจ",vacation:"ลาพักร้อน",off:"หยุด",absent:"ขาด",leave:"ลา"};

function HolidayMgmt({holidays,setHolidays,settings,setWorkdays,showToast}) {
  const [newName,setNewName] = React.useState("");
  const [newDate,setNewDate] = React.useState("");
  const thisYear = now.getFullYear();
  const sorted = [...holidays].filter(h=>Number(h.year)===thisYear).sort((a,b)=>a.date.localeCompare(b.date));

  const addHoliday=()=>{
    if(!newName.trim()||!newDate){showToast("กรอกชื่อและวันที่ด้วยครับ","warning");return;}
    const [y]=newDate.split("-");
    const id=`H${Date.now()}`;
    setHolidays(prev=>[...prev,{id,name:newName.trim(),date:newDate,year:Number(y)}]);
    setNewName("");setNewDate("");showToast(`เพิ่มวันหยุด "${newName}" แล้ว ✓`);
  };
  const removeHoliday=(id)=>{
    setHolidays(prev=>prev.filter(h=>h.id!==id));
    showToast("ลบวันหยุดแล้ว");
  };
  const workdays=settings?.workdays||[0,1,2,3,4,5,6];
  const toggleDay=(wd)=>{
    const next=workdays.includes(wd)?workdays.filter(d=>d!==wd):[...workdays,wd].sort();
    setWorkdays(next);
    showToast(`อัปเดตวันบังคับทำงานแล้ว ✓`);
  };

  return(
    <div>
      {/* Workdays Config */}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10,flexWrap:"wrap",gap:8}}>
        <h2 style={{color:"var(--g)",fontSize:18,fontWeight:800}}>⚙️ วันบังคับทำงาน</h2>
      </div>
      <div className="card" style={{marginBottom:22}}>
        <div style={{fontSize:12,color:"var(--gr)",marginBottom:10}}>เลือกวันที่พนักงานต้องมาทำงาน (ถ้าพนักงานกดหยุดในวันนี้จะมี warning)</div>
        <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
          {[0,1,2,3,4,5,6].map(wd=>(
            <button key={wd}
              className={`btn sm ${workdays.includes(wd)?"bg":"bo"}`}
              onClick={()=>toggleDay(wd)}>
              {DAY_NAMES[wd]}
            </button>
          ))}
        </div>
      </div>

      {/* Holidays */}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10,flexWrap:"wrap",gap:8}}>
        <h2 style={{color:"var(--g)",fontSize:18,fontWeight:800}}>📅 วันหยุดนักขัตฤกษ์ {thisYear+543}</h2>
      </div>
      <div className="card" style={{marginBottom:22}}>
        <div style={{fontSize:12,color:"var(--gr)",marginBottom:12}}>วันที่กำหนดจะขึ้นสีเหลืองในปฏิทิน</div>
        <div style={{display:"flex",gap:8,marginBottom:14,flexWrap:"wrap"}}>
          <input className="fi" style={{flex:1,minWidth:120}} placeholder="ชื่อวันหยุด เช่น วันสงกรานต์" value={newName} onChange={e=>setNewName(e.target.value)}/>
          <input type="date" className="fi" style={{flex:1,minWidth:130}} value={newDate} onChange={e=>setNewDate(e.target.value)}/>
          <button className="btn bg" onClick={addHoliday}>+ เพิ่ม</button>
        </div>
        {sorted.length===0&&<div style={{color:"var(--gr)",fontSize:13,fontStyle:"italic"}}>ยังไม่มีวันหยุดนักขัตฤกษ์</div>}
        {sorted.map(h=>{
          const d=new Date(h.date);
          const label=`${d.getDate()}/${d.getMonth()+1}/${d.getFullYear()+543} (${DAY_NAMES[d.getDay()]})`;
          return(
            <div key={h.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"9px 0",borderBottom:"1px solid rgba(201,162,39,.1)"}}>
              <div>
                <div style={{fontWeight:700,color:"#f5c842"}}>🟡 {h.name}</div>
                <div style={{fontSize:12,color:"var(--gr)"}}>{label}</div>
              </div>
              <button className="btn bd sm" onClick={()=>removeHoliday(h.id)}>🗑</button>
            </div>
          );
        })}
      </div>
    </div>
  );
}

/* ═══════════════════ OT APPROVAL ═══════════════════ */
function OTApproval({period,pDays,otReqs,setOtReqs,emps,leaves,setLeaves,getLeave,shifts,setShifts,currentUser}) {
  const {year:y,month:m}=period;
  const myOT=otReqs.filter(o=>o.year===y&&o.month===m);
  const pending=myOT.filter(o=>o.status==="pending");
  const approved=myOT.filter(o=>o.status==="approved");
  const rejected=myOT.filter(o=>o.status==="rejected");

  const OTRow=({ot,showActions})=>{
    const emp=emps.find(e=>e.id===ot.eid||e.id===ot.empId);
    return(
      <div className="otrow">
        <div style={{flex:1}}>
          <div style={{fontWeight:700}}>{emp?.name} {emp?.surname} <span style={{fontSize:12,color:"var(--g)"}}>({emp?.nick})</span></div>
          <div style={{fontSize:12,color:"var(--gr)",marginTop:2}}>วันที่ {ot.day} {THAI_MONTHS[m-1]} — โอที {ot.hours} ชั่วโมง</div>
          {ot.reason&&<div style={{fontSize:12,color:"var(--gl)"}}>เหตุผล: {ot.reason}</div>}
          {ot.approvedBy&&<div style={{fontSize:11,color:"var(--gr)"}}>โดย: {ot.approvedBy}</div>}
        </div>
        <div style={{display:"flex",gap:6,alignItems:"center",flexWrap:"wrap"}}>
          {ot.status==="pending"&&<span className="tag tp">รออนุมัติ</span>}
          {ot.status==="approved"&&<span className="tag ta">อนุมัติแล้ว</span>}
          {ot.status==="rejected"&&<span className="tag ti">ไม่อนุมัติ</span>}
          {showActions&&<>
            <button className="btn bs sm" onClick={()=>{
              const byName=currentUser?.name||"ผู้จัดการ";
              setOtReqs(p=>p.map(o=>o.id===ot.id?{...o,status:"approved",approvedBy:byName}:o));
              const empN=emps.find(e=>e.id===ot.eid||e.id===ot.empId);
            }}>✓</button>

/* ═══════════════════ EXPORT ═══════════════════ */
function ExportPanel({period,pDays,activeEmps,shifts,teams,getShift,getSlot,otReqs}) {
  const {year:y,month:m,half}=period;
  const exportCSV=()=>{
    const h=["สาขา","แผนก","ตำแหน่ง","นำหน้า","รหัสพนง.","ชื่อ","สกุล","ชื่อ-สกุล","ชื่อเล่น","ประเภท กะ","เวลาเข้าจัดกะ","เวลา ออก","ใส่วันหยุด","วันที่","","","โอที","ชื่อ-สกุล & วันที่"];
    const rows=[];
    activeEmps.forEach(emp=>{
      const tm=teams.find(t=>t.id===emp.teamId);
      pDays.forEach(d=>{
        const sh=getShift(emp.id,y,m,d);
        const slot=sh?.t==="work"?getSlot(sh.sid):null;
        const ot=otReqs?.find(o=>o.eid===emp.id&&o.day===d&&o.year===y&&o.month===m&&o.status==="approved");
        rows.push(["C4",tm?.name||"รัตนมาร์ท","เช็คเกอร์",emp.gender,emp.id,emp.name,emp.surname,`${emp.name} ${emp.surname}`,emp.nick,"",
          slot?thaiTex(slot.start):"",slot?thaiTex(slot.end):"",sh?.t==="off"?"Day Off":"",`${d}/${m}/${y}`,"","",
          ot?ot.hours:"",`${emp.name} ${emp.surname} ${d}/${m}`].join(","));
      });
    });
    const csv=[h.join(","),...rows].join("\n");
    const blob=new Blob(["\uFEFF"+csv],{type:"text/csv;charset=utf-8;"});
    const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download=`rattana-${y}-${pad2(m)}-${half}.csv`;a.click();
  };

  return(
    <div>
      <h2 style={{color:"var(--g)",fontSize:20,fontWeight:800,marginBottom:14}}>ส่งออก — {THAI_MONTHS[m-1]} {y+543} รอบ {half==="1-15"?"1–15":"16–"+daysInMo(m,y)}</h2>
      <div className="al ai" style={{marginBottom:14}}>📋 Column Q = โอที (เฉพาะที่อนุมัติแล้ว) — File → Import ใน Google Sheets</div>
      <div className="srow">
        <div className="sbox"><div className="snum">{activeEmps.length}</div><div className="slbl">พนักงาน</div></div>
        <div className="sbox"><div className="snum">{pDays.length}</div><div className="slbl">วัน</div></div>
        <div className="sbox"><div className="snum">{activeEmps.length*pDays.length}</div><div className="slbl">แถวข้อมูล</div></div>
        <div className="sbox"><div className="snum" style={{color:"#f5c842"}}>{otReqs?.filter(o=>o.year===y&&o.month===m&&o.status==="approved").length||0}</div><div className="slbl">OT อนุมัติ</div></div>
      </div>
      <button className="btn bg" style={{fontSize:15,padding:"13px 28px"}} onClick={exportCSV}>📥 ดาวน์โหลด CSV</button>
      <div style={{fontSize:12,color:"var(--gr)",marginTop:7}}>UTF-8 BOM รองรับภาษาไทย</div>
    </div>
  );
}

                    <div style={{background:"rgba(230,126,34,.1)",border:"2px solid rgba(230,126,34,.3)",borderRadius:12,padding:"14px 16px",marginBottom:12,textAlign:"center"}}>
                      <div style={{fontSize:22,marginBottom:4}}>{LEAVE_ICON[sh2.leaveType]||"📋"}</div>
                      <div style={{fontSize:14,fontWeight:800,color:"#e67e22"}}>ลาอนุมัติแล้ว — {LEAVE_LABEL[sh2.leaveType]||sh2.leaveType}</div>
                    </div>
                  );
                  if(lv&&lv.status==="pending") return(
                    <div style={{background:"rgba(245,200,66,.08)",border:"2px solid rgba(245,200,66,.3)",borderRadius:12,padding:"14px 16px",marginBottom:12,textAlign:"center"}}>
                      <div style={{fontSize:20,marginBottom:4}}>⏳</div>
                      <div style={{fontSize:14,fontWeight:700,color:"#f5c842"}}>รอผู้จัดการอนุมัติการลา</div>
                      <div style={{fontSize:12,color:"var(--gr)",marginTop:4}}>{LEAVE_ICON[lv.type]||"📋"} {LEAVE_LABEL[lv.type]||lv.type}</div>
                      {lv.reason&&<div style={{fontSize:12,color:"var(--gl)",marginTop:2}}>{lv.reason}</div>}
                      <button className="btn bo sm" style={{marginTop:10}} onClick={()=>setLeaves(prev=>prev.filter(l=>l.id!==lv.id))}>ยกเลิกคำขอลา</button>
                    </div>
                  );
                  if(lv&&lv.status==="rejected") return(
                    <div className="al ad" style={{marginBottom:12}}>✗ คำขอลาถูกปฏิเสธ — สามารถเลือกกะใหม่ได้</div>
                  );
                  return null;
                })()}

                {/* ── Leave request buttons (show if no pending leave, not absent, not approved leave) ── */}
                {(()=>{
                  const lv=getLeave(employee.id,y,m,selDay);
                  const sh2=my(selDay);
                  const hasBlocker = (lv&&(lv.status==="pending"||lv.status==="approved"))||sh2?.t==="absent"||sh2?.t==="leave";
                  if(hasBlocker||pendingSlot) return null;
                  return(
                    <div style={{marginBottom:12}}>
                      <div style={{fontSize:12,color:"var(--gr)",fontWeight:600,marginBottom:7}}>📋 ขอลา</div>
                      <div style={{display:"flex",gap:7,flexWrap:"wrap"}}>
                        {LEAVE_TYPE_OPTIONS.map(lt=>(
                          <button key={lt.type} className="btn bw sm" onClick={()=>{
                            const id=`L${Date.now()}`;
                            setLeaves(prev=>[...prev.filter(l=>!(String(l.empId)===String(employee.id)&&l.year===y&&l.month===m&&l.day===selDay)),{id,empId:employee.id,year:y,month:m,day:selDay,type:lt.type,reason:"",status:"pending"}]);
                            showToast(`ส่งคำขอ${LEAVE_LABEL[lt.type]}แล้ว ✓`);
                            closeModal();
                          }}>{lt.label}</button>
                        ))}
                      </div>
                    </div>
                  );
                })()}

                {/* แสดงที่เลือกชั่วคราว */}
                {pendingSlot&&(
                  <div style={{background:"rgba(201,162,39,.12)",border:"2px solid rgba(201,162,39,.4)",borderRadius:12,padding:"12px 14px",marginBottom:12,display:"flex",alignItems:"center",gap:10}}>
                    <div style={{fontSize:20}}>
                      {pendingSlot.type==="off"?"🏖️":"⏰"}
                    </div>
                    <div style={{flex:1}}>
                      {pendingSlot.type==="off"
                        ?<div style={{fontWeight:700,color:"#ff9090"}}>วันหยุด</div>
                        :<div style={{fontWeight:700,color:"var(--gl)"}}>
                            {thaiTC(getSlot(pendingSlot.sid)?.start)} – {thaiTC(getSlot(pendingSlot.sid)?.end)}
                          </div>
                      }
                      <div style={{fontSize:12,color:"var(--gr)"}}>กดยืนยันเพื่อล็อคกะนี้</div>
                    </div>
                  </div>
                )}

                {/* ปุ่มยืนยัน */}
                {pendingSlot&&(
                  <button className="btn bg" style={{width:"100%",justifyContent:"center",padding:"14px",fontSize:15,marginBottom:12}}
                    onClick={confirmSlot}>
                    ✅ ยืนยันกะนี้ — ล็อคและบันทึก
                  </button>
                )}

                {/* เลือกวันหยุด */}
                {!pendingSlot&&(
                  <button className="dob" onClick={pickOff}>🏖️ วันหยุด (Day Off)</button>
                )}
                {pendingSlot?.type==="off"&&(
                  <button className="dob" style={{opacity:.6}} onClick={()=>setPendingSlot(null)}>🏖️ วันหยุด — กดยืนยันด้านบน</button>
                )}

                <div className="div"/>
                <div style={{fontSize:12,color:"var(--gr)",marginBottom:9,fontWeight:600}}>
                  {pendingSlot?.type==="work"?"✓ เลือกแล้ว — กดยืนยัน":"เลือกกะ"} ({empTeam?.name||"–"})
                </div>
                {empSlots.length===0
                  ?<div className="al aw">ยังไม่มีกะสำหรับทีมนี้</div>
                  :<div className="slgrid">
                    {empSlots.map(slot=>{
                      const cnt=slotCount(slot.id,y,m,selDay);
                      const full=cnt>=slot.cap;
                      const isPending=pendingSlot?.type==="work"&&pendingSlot?.sid===slot.id;
                      return(
                        <div key={slot.id} className={`slcard ${isPending?"sel":""} ${full&&!isPending?"full":""}`}
                          onClick={()=>!full&&pickSlot(slot.id)}>
                          <div className="sltime">{thaiTC(slot.start)}<br/><span style={{fontSize:9,color:"var(--gr)"}}>↓ {slot.hours} ชม.</span><br/>{thaiTC(slot.end)}</div>
                          <div style={{fontSize:11,color:"var(--gr)",marginTop:3}}>{cnt}/{slot.cap} คน</div>
                          {full&&!isPending&&<div style={{color:"var(--err)",fontSize:11,fontWeight:700}}>⚠ เต็ม</div>}
                          {isPending&&<div style={{color:"var(--g)",fontSize:12,fontWeight:800}}>✓ เลือก</div>}
                        </div>
                      );
                    })}
                  </div>
                }
                <div className="mfoot">
                  {pendingSlot&&<button className="btn bn" onClick={()=>setPendingSlot(null)}>← ยกเลิก</button>}
                  <button className="btn bo" onClick={closeModal}>ปิด</button>
                </div>
              </div>
            )}
          </div>
        </div>
      )}
    </>
  );
}

/* ═══════════════════ OT REQUEST (EMPLOYEE) ═══════════════════ */
function OTRequestEmp({employee,period,pDays,otReqs,setOtReqs,getShift,getSlot,showToast}) {
  const {year:y,month:m}=period;
  const [form,setForm]=useState({day:"",hours:1,reason:""});
  const [showForm,setShowForm]=useState(false);
  const myOT=otReqs.filter(o=>o.eid===employee.id&&o.year===y&&o.month===m);
  const statusC={pending:"#f5c842",approved:"#68d49e",rejected:"#ff9090"};
  const statusL={pending:"รออนุมัติ",approved:"อนุมัติแล้ว",rejected:"ไม่อนุมัติ"};

  const submit=()=>{
    if(!form.day){showToast("กรุณาเลือกวันที่","warning");return;}
    const d=Number(form.day);
    const sh=getShift(employee.id,y,m,d);
    if(sh?.t==="off"){showToast("ไม่สามารถขอโอทีในวันหยุดได้","warning");return;}
    if(myOT.some(o=>o.day===d)){showToast("คุณขอโอทีวันนี้ไปแล้ว","warning");return;}
    setOtReqs(p=>[...p,{id:`OT${Date.now()}`,eid:employee.id,day:d,hours:Number(form.hours),reason:form.reason,year:y,month:m,status:"pending"}]);
    setForm({day:"",hours:1,reason:""});setShowForm(false);showToast("ส่งคำขอโอทีสำเร็จ ✓");
  };

  return(
    <div>
      <div style={{display:"flex",justifyContent:"space-between",marginBottom:14,flexWrap:"wrap",gap:8}}>
        <div>
          <h2 style={{color:"var(--g)",fontSize:18,fontWeight:800}}>คำขอโอที (OT)</h2>
          <div style={{fontSize:12,color:"var(--gr)"}}>{THAI_MONTHS[m-1]} {y+543}</div>
        </div>
        <button className="btn bg" onClick={()=>setShowForm(true)}>+ ขอโอที</button>
      </div>
      <div className="al ai" style={{marginBottom:12}}>ℹ️ โอทีจะปรากฏใน Column Q ของ Google Sheets เมื่อผู้จัดการอนุมัติ</div>
      {myOT.length===0
        ?<div style={{textAlign:"center",color:"var(--gr)",padding:32}}>ยังไม่มีคำขอโอทีในเดือนนี้</div>
        :myOT.sort((a,b)=>a.day-b.day).map(ot=>(
          <div key={ot.id} className="otrow">
            <div style={{flex:1}}>
              <div style={{fontWeight:700}}>วันที่ {ot.day} {THAI_MONTHS[m-1]} {y+543}</div>
              <div style={{fontSize:12,color:"var(--gr)"}}>โอที {ot.hours} ชั่วโมง
                {getShift(employee.id,y,m,ot.day)?.t==="work"&&<span style={{marginLeft:6,color:"var(--g)"}}>(กะ {cleanTime(getSlot(getShift(employee.id,y,m,ot.day).sid)?.start)} น.)</span>}
              </div>
              {ot.reason&&<div style={{fontSize:12,color:"var(--gr)"}}>เหตุผล: {ot.reason}</div>}
            </div>
            <span style={{color:statusC[ot.status],fontWeight:700,fontSize:13}}>{statusL[ot.status]}</span>
          </div>
        ))
      }

      {showForm&&(
        <div className="mover" onClick={()=>setShowForm(false)}>
          <div className="modal" onClick={e=>e.stopPropagation()}>
            <div className="mtit">⏰ ขอโอที — {THAI_MONTHS[m-1]} {y+543}</div>
            <div className="fg">
              <label className="fl">เลือกวัน</label>
              <select className="fs" value={form.day} onChange={e=>setForm(p=>({...p,day:e.target.value}))}>
                <option value="">เลือกวัน...</option>
                {pDays.map(d=>{
                  const sh=getShift(employee.id,y,m,d);
                  if(sh?.t==="off"||myOT.some(o=>o.day===d)) return null;
                  const sl=sh?.t==="work"?getSlot(sh.sid):null;
                  const wd=THAI_DAYS_FULL[new Date(y,m-1,d).getDay()];
                  return <option key={d} value={d}>{d} {THAI_MONTHS[m-1]} ({wd}){sl?` — กะ ${sl.start} น.`:""}</option>;
                })}
              </select>
            </div>
            <div className="fg">
              <label className="fl">จำนวนชั่วโมงโอที</label>
              <select className="fs" value={form.hours} onChange={e=>setForm(p=>({...p,hours:Number(e.target.value)}))}>
                {[1,2,3,4].map(h=><option key={h} value={h}>{h} ชั่วโมง</option>)}
              </select>
            </div>
            <div className="fg"><label className="fl">เหตุผล (ถ้ามี)</label><input className="fi" value={form.reason} onChange={e=>setForm(p=>({...p,reason:e.target.value}))} placeholder="เช่น งานเร่ง, ปิดรอบ..."/></div>
            <div className="mfoot"><button className="btn bo" onClick={()=>setShowForm(false)}>ยกเลิก</button><button className="btn bg" onClick={submit}>ส่งคำขอ</button></div>
          </div>
        </div>
      )}
    </div>
  );
}

  </script>
</body>
